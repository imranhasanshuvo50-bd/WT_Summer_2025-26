<!DOCTYPE html>
<html >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Service Request Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Office of Student Affairs</h1>
        <p>Empowering Students. Enhancing Experience. Inspiring Futures</p>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <main>

      
        <section class="description">
            <h2>Available Services</h2>
            <p>
                 Transcript collection, ID card issues,
                and general inquiries through this portal.
            </p>
        </section>
        <section class="form-box">
            <h2>Service Request Form</h2>

            <form>
                <label for="studentName">Student Name</label>
                <input type="text" id="studentName" name="studentName" required>

                <label for="studentId">Student ID</label>
                <input type="text" id="studentId" name="studentId" maxlength="10" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <label for="serviceType">Service Type</label>
                <select id="serviceType" name="serviceType">
                    <option value="">Select a service</option>
                    <option value="transcript">Transcript Request</option>
                    <option value="id-card">ID Card Issue</option>
                    <option value="general">General Inquiry</option>
                </select>

                <label>Urgency Level</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="urgency" value="normal"> Normal
                    </label>

                    <label>
                        <input type="radio" name="urgency" value="urgent"> Urgent
                    </label>
                </div>

                <label for="details">Additional Details</label>
                <textarea id="details" name="details" placeholder="Write your request details here"></textarea>

                <button type="submit">Submit Request</button>
            </form>
        </section>

    </main>
    <footer>
        <p>&copy; 2026 Student Affairs Department. All rights reserved.</p>
    </footer>

</body>
</html>
